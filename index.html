<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Daglige Mål" />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Daglige Mål</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: rgba(255,255,255,0.07);
      --accent: #c8f04a;
      --accent-dim: rgba(200,240,74,0.15);
      --accent-glow: rgba(200,240,74,0.08);
      --text: #f0f0f5;
      --text-muted: #6b6b80;
      --text-dim: #9999aa;
      --danger: #ff5f5f;
      --success: #c8f04a;
      --safe: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
      padding-bottom: calc(var(--safe) + 80px);
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(200,240,74,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── HEADER ─── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: env(safe-area-inset-top, 44px) 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }

    .date-label {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -0.5px;
    }

    .date-sub {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 300;
      margin-top: 2px;
    }

    .streak-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-dim);
      border: 1px solid rgba(200,240,74,0.2);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }

    /* Progress bar */
    .progress-wrap {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #a8e020);
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .progress-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      min-width: 32px;
      text-align: right;
    }

    /* ─── VIEWS ─── */
    .view { display: none; }
    .view.active { display: block; }

    /* ─── GOALS LIST ─── */
    .goals-section {
      padding: 20px 16px 0;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .goal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 8px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .goal-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-glow);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .goal-card.done::before { opacity: 1; }
    .goal-card.done { border-color: rgba(200,240,74,0.2); }

    .goal-card:active { transform: scale(0.98); }

    .goal-check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
      background: var(--surface2);
      cursor: pointer;
      position: relative;
      z-index: 1;
    }

    .goal-card.done .goal-check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .goal-check svg {
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .goal-card.done .goal-check svg {
      opacity: 1;
      transform: scale(1);
    }

    .goal-info {
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .goal-name {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.3;
    }

    .goal-card.done .goal-name {
      color: var(--text-muted);
    }

    .goal-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Cost input */
    .cost-input-wrap {
      position: relative;
      z-index: 1;
    }

    .cost-input-wrap.hidden { display: none; }

    .cost-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .cost-label {
      font-size: 13px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .cost-field {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 8px 12px;
      width: 110px;
      outline: none;
      transition: border-color 0.2s;
    }

    .cost-field:focus { border-color: rgba(200,240,74,0.4); }

    .cost-currency {
      font-size: 14px;
      color: var(--text-dim);
    }

    /* ─── BOTTOM NAV ─── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 16px calc(var(--safe) + 8px);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      z-index: 200;
    }

    .nav-btn {
      flex: 1;
      padding: 14px 8px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--text-muted);
      background: transparent;
    }

    .nav-btn.active {
      color: var(--accent);
      background: var(--accent-dim);
    }

    .nav-btn svg { width: 20px; height: 20px; }

    /* ─── SAVE BUTTON ─── */
    .save-btn {
      width: calc(100% - 32px);
      margin: 16px 16px 8px;
      padding: 18px;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .save-btn:active { transform: scale(0.98); opacity: 0.9; }

    .save-btn.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .save-btn.success {
      background: #3dd68c;
    }

    /* ─── HISTORY VIEW ─── */
    .history-list { padding: 16px; }

    .history-entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 10px;
    }

    .history-date {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      margin-bottom: 10px;
    }

    .history-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 9px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--text-muted);
    }

    .chip.done {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .history-score {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 10px;
    }

    /* ─── SETTINGS VIEW ─── */
    .settings-section { padding: 20px 16px 0; }

    .settings-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      gap: 14px;
    }

    .settings-row:last-child { border-bottom: none; }

    .settings-row-text { flex: 1; }
    .settings-row-title { font-size: 15px; font-weight: 500; }
    .settings-row-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .settings-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      width: 100%;
      outline: none;
      margin-top: 8px;
      transition: border-color 0.2s;
    }

    .settings-input:focus { border-color: rgba(200,240,74,0.4); }

    .btn-small {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-accent {
      background: var(--accent);
      color: #0a0a0f;
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
    }

    .btn-danger {
      background: rgba(255,95,95,0.15);
      color: var(--danger);
      border: 1px solid rgba(255,95,95,0.2);
    }

    /* Add goal form */
    .add-goal-form {
      padding: 16px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: block;
    }

    .form-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 13px 16px;
      width: 100%;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .form-input:focus { border-color: rgba(200,240,74,0.4); }

    .type-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .type-btn {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface2);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .type-btn.active {
      border-color: rgba(200,240,74,0.3);
      background: var(--accent-dim);
      color: var(--accent);
    }

    /* Toast */
    .toast {
      position: fixed;
      top: calc(env(safe-area-inset-top, 44px) + 70px);
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 999;
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success-toast { color: var(--accent); border-color: rgba(200,240,74,0.3); }
    .toast.error-toast { color: var(--danger); border-color: rgba(255,95,95,0.3); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; line-height: 1.5; }

    /* Scrollable content area */
    .scroll-content {
      padding-bottom: 16px;
    }

    /* Goal drag handle for reorder (visual only) */
    .drag-handle {
      color: var(--text-muted);
      opacity: 0.4;
      flex-shrink: 0;
      cursor: grab;
      padding: 4px;
    }

    .goal-icon {
      font-size: 20px;
      flex-shrink: 0;
      width: 32px;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="date-label" id="headerDate">Mandag</div>
      <div class="date-sub" id="headerDateFull">1. januar 2025</div>
    </div>
    <div class="streak-badge" id="streakBadge">
      🔥 <span id="streakCount">0</span>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progressText">0/9</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- VIEW: TODAY -->
<div class="view active" id="view-today">
  <div class="scroll-content">
    <div class="goals-section" id="goalsContainer"></div>
    <div style="padding: 0 16px;">
      <button class="save-btn" id="saveBtn" onclick="saveToday()">
        Lagre til Google Sheets ↗
      </button>
    </div>
  </div>
</div>

<!-- VIEW: HISTORY -->
<div class="view" id="view-history">
  <div class="scroll-content">
    <div class="history-list" id="historyList">
      <div class="empty-state">
        <div class="icon">📊</div>
        <p>Ingen registreringer ennå.<br/>Fullfør en dag og trykk Lagre.</p>
      </div>
    </div>
  </div>
</div>

<!-- VIEW: SETTINGS -->
<div class="view" id="view-settings">
  <div class="scroll-content">
    <div class="settings-section">

      <div class="section-label">Google Sheets</div>
      <div class="settings-card">
        <div class="settings-row" style="flex-direction: column; align-items: flex-start;">
          <div class="settings-row-text" style="width:100%">
            <div class="settings-row-title">Apps Script URL</div>
            <div class="settings-row-sub">Lim inn URL fra Google Apps Script</div>
            <input type="url" class="settings-input" id="scriptUrlInput"
              placeholder="https://script.google.com/macros/s/..."
              oninput="saveSettings()" />
          </div>
        </div>
        <div class="settings-row">
          <div class="settings-row-text">
            <div class="settings-row-title">Test tilkobling</div>
            <div class="settings-row-sub">Sjekk at URL-en fungerer</div>
          </div>
          <button class="btn-small btn-ghost" onclick="testConnection()">Test</button>
        </div>
      </div>

      <div class="section-label">Mål</div>
      <div class="settings-card" id="goalsList"></div>

      <div class="add-goal-form">
        <label class="form-label">Legg til nytt mål</label>
        <input type="text" class="form-input" id="newGoalName" placeholder="Navn på mål..." />
        <div class="type-toggle">
          <button class="type-btn active" id="typeYesNo" onclick="setGoalType('yesno')">✓ Ja / Nei</button>
          <button class="type-btn" id="typeNumber" onclick="setGoalType('number')"># Tall / Score</button>
          <button class="type-btn" id="typeCost" onclick="setGoalType('cost')">kr Kostnad</button>
        </div>
        <input type="text" class="form-input" id="newGoalMeta" placeholder="Beskrivelse (valgfritt)..." />
        <button class="btn-small btn-accent" style="width:100%;padding:14px;" onclick="addGoal()">+ Legg til mål</button>
      </div>

      <div class="section-label">Data</div>
      <div class="settings-card">
        <div class="settings-row">
          <div class="settings-row-text">
            <div class="settings-row-title">Nullstill i dag</div>
            <div class="settings-row-sub">Fjern dagens utfylling</div>
          </div>
          <button class="btn-small btn-ghost" onclick="resetToday()">Nullstill</button>
        </div>
        <div class="settings-row">
          <div class="settings-row-text">
            <div class="settings-row-title">Slett all historikk</div>
            <div class="settings-row-sub">Kan ikke angres</div>
          </div>
          <button class="btn-small btn-danger" onclick="clearHistory()">Slett</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-today" onclick="switchView('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    I dag
  </button>
  <button class="nav-btn" id="nav-history" onclick="switchView('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    Historikk
  </button>
  <button class="nav-btn" id="nav-settings" onclick="switchView('settings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    Innstillinger
  </button>
</div>

<script>
// ─── DEFAULT GOALS ───────────────────────────────────────────────
const DEFAULT_GOALS = [
  { id: 'g1', name: '2,5 flasker vann på jobb', type: 'yesno', meta: 'Hydrering på jobben', icon: '💧' },
  { id: 'g2', name: 'Ta med matpakke', type: 'yesno', meta: 'Spar penger og spis sunt', icon: '🥗' },
  { id: 'g3', name: 'Kjøpe lunsj', type: 'cost', meta: 'Logg kostnad hvis ja', icon: '🧾' },
  { id: 'g4', name: '3 glass vann hjemme', type: 'yesno', meta: 'Hydrering etter jobb', icon: '🫗' },
  { id: 'g5', name: 'Ikke drikke brus', type: 'yesno', meta: 'Unngå sukker og koffein', icon: '🚫' },
  { id: 'g6', name: 'Proteinshake', type: 'yesno', meta: 'Proteintilskudd', icon: '💪' },
  { id: 'g7', name: 'Kreatin', type: 'yesno', meta: 'Daglig supplement', icon: '⚡' },
  { id: 'g8', name: 'Magnesium', type: 'yesno', meta: 'Daglig supplement', icon: '🌿' },
  { id: 'g9', name: 'Sove før 22:30', type: 'yesno', meta: 'Prioriter søvn', icon: '🌙' },
];

// ─── STATE ───────────────────────────────────────────────────────
let goals = JSON.parse(localStorage.getItem('goals')) || DEFAULT_GOALS;
let todayData = JSON.parse(localStorage.getItem('todayData')) || {};
let history = JSON.parse(localStorage.getItem('history')) || [];
let settings = JSON.parse(localStorage.getItem('settings')) || { scriptUrl: '' };
let newGoalType = 'yesno';
const todayKey = getTodayKey();

// Reset today data if it's a new day
if (todayData.date && todayData.date !== todayKey) {
  todayData = { date: todayKey };
  localStorage.setItem('todayData', JSON.stringify(todayData));
}
if (!todayData.date) todayData.date = todayKey;

// ─── HELPERS ─────────────────────────────────────────────────────
function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateNorwegian(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const days = ['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];
  const months = ['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];
  return { day: days[d.getDay()], full: `${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}` };
}

function saveState() {
  localStorage.setItem('goals', JSON.stringify(goals));
  localStorage.setItem('todayData', JSON.stringify(todayData));
  localStorage.setItem('history', JSON.stringify(history));
  localStorage.setItem('settings', JSON.stringify(settings));
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type ? type + '-toast' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

function calcStreak() {
  if (!history.length) return 0;
  const sorted = [...history].sort((a,b) => b.date.localeCompare(a.date));
  let streak = 0;
  let check = new Date();
  check.setDate(check.getDate() - 1);
  for (const entry of sorted) {
    const d = new Date(entry.date + 'T12:00:00');
    const expected = `${check.getFullYear()}-${String(check.getMonth()+1).padStart(2,'0')}-${String(check.getDate()).padStart(2,'0')}`;
    if (entry.date === expected) { streak++; check.setDate(check.getDate()-1); }
    else break;
  }
  return streak;
}

// ─── HEADER ──────────────────────────────────────────────────────
function updateHeader() {
  const { day, full } = formatDateNorwegian(todayKey);
  document.getElementById('headerDate').textContent = day;
  document.getElementById('headerDateFull').textContent = full;
  document.getElementById('streakCount').textContent = calcStreak();
  updateProgress();
}

function updateProgress() {
  let done = 0;
  goals.forEach(g => {
    const val = todayData[g.id];
    if (g.type === 'cost') { if (val && val.done) done++; }
    else { if (val) done++; }
  });
  const pct = goals.length ? Math.round((done / goals.length) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done}/${goals.length}`;
}

// ─── GOALS RENDER ────────────────────────────────────────────────
function renderGoals() {
  const container = document.getElementById('goalsContainer');
  container.innerHTML = '';

  // Group by category
  const groups = [
    { label: 'Ernæring & Hydrering', ids: ['g1','g2','g3','g4','g5'] },
    { label: 'Supplementer', ids: ['g6','g7','g8'] },
    { label: 'Livsstil', ids: ['g9'] },
  ];

  const usedIds = new Set();
  const goalMap = {};
  goals.forEach(g => goalMap[g.id] = g);

  let html = '';

  // Render known groups
  groups.forEach(group => {
    const groupGoals = group.ids.map(id => goalMap[id]).filter(Boolean);
    if (!groupGoals.length) return;
    groupGoals.forEach(id => usedIds.add(id));

    html += `<div class="section-label">${group.label}</div>`;
    groupGoals.forEach(g => {
      html += renderGoalCard(g);
      usedIds.add(g.id);
    });
  });

  // Custom goals
  const customGoals = goals.filter(g => !usedIds.has(g));
  const byId = goals.filter(g => !['g1','g2','g3','g4','g5','g6','g7','g8','g9'].includes(g.id));
  if (byId.length) {
    html += `<div class="section-label">Mine mål</div>`;
    byId.forEach(g => { html += renderGoalCard(g); });
  }

  container.innerHTML = html;
}

function renderGoalCard(g) {
  const val = todayData[g.id];
  let isDone = false;
  if (g.type === 'cost') isDone = val && val.done;
  else isDone = !!val;

  const costHidden = (g.type !== 'cost' || !isDone) ? ' hidden' : '';
  const costVal = (g.type === 'cost' && val && val.amount) ? val.amount : '';

  return `
    <div class="goal-card ${isDone ? 'done' : ''}" id="card-${g.id}" onclick="toggleGoal('${g.id}', event)">
      <div class="goal-icon">${g.icon || '📌'}</div>
      <div class="goal-info">
        <div class="goal-name">${g.name}</div>
        ${g.meta ? `<div class="goal-meta">${g.meta}</div>` : ''}
        <div class="cost-input-wrap${costHidden}" id="cost-wrap-${g.id}">
          <div class="cost-row">
            <span class="cost-label">Kostnad:</span>
            <input type="number" class="cost-field" id="cost-${g.id}"
              value="${costVal}"
              placeholder="0"
              onclick="event.stopPropagation()"
              oninput="setCost('${g.id}', this.value)" />
            <span class="cost-currency">kr</span>
          </div>
        </div>
      </div>
      <div class="goal-check" id="check-${g.id}">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <polyline points="2,7 5.5,10.5 12,3.5" stroke="#0a0a0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>`;
}

function toggleGoal(id, event) {
  const g = goals.find(x => x.id === id);
  if (!g) return;

  if (g.type === 'cost') {
    const current = todayData[id] || { done: false, amount: '' };
    current.done = !current.done;
    todayData[id] = current;

    const card = document.getElementById('card-' + id);
    const wrap = document.getElementById('cost-wrap-' + id);
    if (current.done) {
      card.classList.add('done');
      wrap.classList.remove('hidden');
    } else {
      card.classList.remove('done');
      wrap.classList.add('hidden');
    }
  } else {
    todayData[id] = !todayData[id];
    const card = document.getElementById('card-' + id);
    const check = document.getElementById('check-' + id);
    card.classList.toggle('done', todayData[id]);
  }

  saveState();
  updateProgress();
}

function setCost(id, val) {
  if (!todayData[id]) todayData[id] = { done: true };
  todayData[id].amount = val;
  saveState();
}

// ─── SAVE TO SHEETS ───────────────────────────────────────────────
async function saveToday() {
  const url = settings.scriptUrl;
  if (!url) {
    showToast('Legg til Apps Script URL i innstillinger', 'error');
    switchView('settings');
    return;
  }

  const btn = document.getElementById('saveBtn');
  btn.classList.add('loading');
  btn.textContent = 'Sender...';

  const payload = {
    date: todayKey,
    goals: goals.map(g => {
      const val = todayData[g.id];
      let result;
      if (g.type === 'cost') {
        result = val && val.done ? (val.amount ? `Ja (${val.amount} kr)` : 'Ja') : 'Nei';
      } else {
        result = val ? 'Ja' : 'Nei';
      }
      return { name: g.name, type: g.type, value: result };
    }),
    score: (() => {
      let done = 0;
      goals.forEach(g => {
        const val = todayData[g.id];
        if (g.type === 'cost') { if (val && val.done) done++; }
        else { if (val) done++; }
      });
      return `${done}/${goals.length}`;
    })()
  };

  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      mode: 'no-cors'
    });

    // Save to local history
    const existing = history.findIndex(h => h.date === todayKey);
    if (existing >= 0) history[existing] = { ...payload, synced: true };
    else history.unshift({ ...payload, synced: true });
    saveState();

    btn.classList.remove('loading');
    btn.classList.add('success');
    btn.textContent = '✓ Lagret!';
    setTimeout(() => {
      btn.classList.remove('success');
      btn.textContent = 'Lagre til Google Sheets ↗';
    }, 2000);
    showToast('Sendt til Google Sheets! ✓', 'success');
    renderHistory();

  } catch (err) {
    btn.classList.remove('loading');
    btn.textContent = 'Lagre til Google Sheets ↗';
    showToast('Feil: Sjekk URL i innstillinger', 'error');
  }
}

// ─── HISTORY ─────────────────────────────────────────────────────
function renderHistory() {
  const container = document.getElementById('historyList');
  if (!history.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📊</div><p>Ingen registreringer ennå.<br/>Fullfør en dag og trykk Lagre.</p></div>`;
    return;
  }
  container.innerHTML = history.map(entry => {
    const { day, full } = formatDateNorwegian(entry.date);
    const chips = entry.goals.map(g =>
      `<span class="chip ${g.value !== 'Nei' ? 'done' : ''}">${g.name.substring(0,18)}</span>`
    ).join('');
    return `
      <div class="history-entry">
        <div class="history-date">${day} — ${full}</div>
        <div class="history-chips">${chips}</div>
        <div class="history-score">Score: ${entry.score} ${entry.synced ? '· Synkronisert ✓' : ''}</div>
      </div>`;
  }).join('');
}

// ─── SETTINGS ────────────────────────────────────────────────────
function renderSettings() {
  document.getElementById('scriptUrlInput').value = settings.scriptUrl || '';

  const list = document.getElementById('goalsList');
  list.innerHTML = goals.map((g, i) => `
    <div class="settings-row">
      <div style="font-size:18px;flex-shrink:0;">${g.icon || '📌'}</div>
      <div class="settings-row-text">
        <div class="settings-row-title">${g.name}</div>
        <div class="settings-row-sub">${g.type === 'cost' ? 'Kostnad' : g.type === 'number' ? 'Tall' : 'Ja/Nei'}</div>
      </div>
      ${goals.length > 1 ? `<button class="btn-small btn-danger" onclick="removeGoal(${i})">Fjern</button>` : ''}
    </div>`).join('');
}

function saveSettings() {
  settings.scriptUrl = document.getElementById('scriptUrlInput').value.trim();
  saveState();
}

async function testConnection() {
  const url = settings.scriptUrl;
  if (!url) { showToast('Ingen URL angitt', 'error'); return; }
  try {
    await fetch(url, { method: 'GET', mode: 'no-cors' });
    showToast('URL ser ok ut ✓', 'success');
  } catch (e) {
    showToast('Kunne ikke nå URL', 'error');
  }
}

function setGoalType(type) {
  newGoalType = type;
  document.getElementById('typeYesNo').classList.toggle('active', type === 'yesno');
  document.getElementById('typeNumber').classList.toggle('active', type === 'number');
  document.getElementById('typeCost').classList.toggle('active', type === 'cost');
}

function addGoal() {
  const name = document.getElementById('newGoalName').value.trim();
  if (!name) { showToast('Gi målet et navn', 'error'); return; }
  const meta = document.getElementById('newGoalMeta').value.trim();
  const icons = ['🎯','⭐','✅','🏃','📝','💡','🔑','🧠','❤️','🌟'];
  const newGoal = {
    id: 'g' + Date.now(),
    name,
    type: newGoalType,
    meta,
    icon: icons[Math.floor(Math.random() * icons.length)]
  };
  goals.push(newGoal);
  saveState();
  document.getElementById('newGoalName').value = '';
  document.getElementById('newGoalMeta').value = '';
  renderGoals();
  renderSettings();
  showToast('Mål lagt til ✓', 'success');
}

function removeGoal(index) {
  if (!confirm(`Fjerne "${goals[index].name}"?`)) return;
  goals.splice(index, 1);
  saveState();
  renderGoals();
  renderSettings();
  showToast('Mål fjernet');
}

function resetToday() {
  if (!confirm('Nullstill dagens utfylling?')) return;
  todayData = { date: todayKey };
  saveState();
  renderGoals();
  updateProgress();
  showToast('Nullstilt ✓');
}

function clearHistory() {
  if (!confirm('Slett ALL historikk? Kan ikke angres.')) return;
  history = [];
  saveState();
  renderHistory();
  showToast('Historikk slettet');
}

// ─── NAVIGATION ──────────────────────────────────────────────────
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.getElementById('nav-' + view).classList.add('active');
  if (view === 'history') renderHistory();
  if (view === 'settings') renderSettings();
}

// ─── INIT ────────────────────────────────────────────────────────
updateHeader();
renderGoals();
</script>
